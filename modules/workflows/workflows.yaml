
main:
  params: [env, dbt_job, region]

  steps:

    - init:
        assign:
          - project: ${sys.get_env("GOOGLE_CLOUD_PROJECT")}

    # ✅ Load Bronze depuis external tables
    - load_users:
        call: googleapis.bigquery.jobs.query
        args:
          projectId: ${project}
          body:
            query: >
              CREATE OR REPLACE TABLE `${project}.bronze.users`
              AS SELECT * FROM `${project}.bronze.users_ext`;

    - load_connections:
        call: googleapis.bigquery.jobs.query
        args:
          projectId: ${project}
          body:
            query: >
              CREATE OR REPLACE TABLE `${project}.bronze.connections`
              AS SELECT * FROM `${project}.bronze.connections_ext`;

    # ✅ Run DBT (Cloud Run Job)
    - run_dbt:
        call: googleapis.run.namespaces.jobs.run
        args:
          name: ${dbt_job}
          location: ${region}

    - done:
        return: "pipeline success"